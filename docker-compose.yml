services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./output:/app/output

  scheduler:
    profiles:
      - scheduler
    build: .
    command: ["python", "scripts/run_daily_scheduler.py"]
    working_dir: /app
    volumes:
      - ./data:/app/data
      - ./output:/app/output
